<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- The sidebar -->
      <div class="sidebar">
        <header class="header">
          <h1>🍔 MOS Burgers</h1>
          <p>Restaurant Management System</p>
        </header>
        <a class="active" href="#home">Store Management</a>
        <a href="#news">Order Management</a>
        <a href="#contact">Customer Management</a>
        <a href="#about">Customer Management</a>
      </div>
      <div class="content">
        <!-- Store management section  -->
        <section id="store" class="content-section active">
          <h2>Store Management</h2>
          <div class="search-box">
            <input
              type="text"
              id="storeSearch"
              placeholder="Search items by name, code, or category..."
              oninput="filterStoreItems()"
            />
          </div>
          <div style="margin-bottom: 20px">
            <button class="btn btn-primary" onclick="showAddItemModal()">
              Add New Item
            </button>
            <button class="btn btn-secondary" onclick="checkExpiredItems()">
              Check Expired Items
            </button>
          </div>
          <div id="storeItems" class="food-grid"></div>
        </section>
      </div>
    </div>
  </body>
</html>
