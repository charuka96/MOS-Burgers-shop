<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body  onload="displayItemStore()">
    <div class="container">
      <!-- The sidebar -->
      <div class="sidebar">
        <header class="header">
          <h1>🍔 MOS Burgers</h1>
          <p>Restaurant Management System</p>
        </header>
        <a class="active" href="#home">Store Management</a>
        <a href="#news">Order Management</a>
        <a href="#contact">Customer Management</a>
        <a href="#about">Customer Management</a>
      </div>
      <div class="content">
        <!-- Store management section  -->
        <section id="store" class="content-section active">
          <h2>Store Management</h2>
          <div class="search-box">
            <label for="">Search Iteam</label>
            <input
              type="search"
              id="storeSearch"
              placeholder="Search items by name, code, or category..."
              oninput="filterStoreItems(event)"
            />
          </div>
          <div style="margin-bottom: 20px">
            <button class="btn btn-primary" onclick="addNewItem()">
              Add New Item
            </button>
          
            <button class="btn btn-secondary" onclick="checkExpiredItems()">
              Check Expired Items
            </button>
          </div>
          <div id="storeItems" class="food-grid"></div>
        </section>
      </div>
    </div>

 <!-- Add Item Modal -->
          <div id="addItemModal" class="modal">
            <div class="modal-content">
              <span
                id="close-modal"
                class="close"
                onclick="document.getElementById('addItemModal').style.display='none'"
                >&times;</span
              >
              <h2>Add New Item</h2>
              <form onsubmit="saveNewItem(event)">
                <div class="form-group">
                  <label>Item Code:</label>
                  <input type="text" id="newItemCode" required />
                </div>
                <div class="form-group">
                  <label>Item Name:</label>
                  <input type="text" id="newItemName" required />
                </div>
                <div class="form-group">
                  <label>Category:</label>
                  <select id="newItemCategory" required>
                    <option value="Burgers">Burgers</option>
                    <option value="Submarines">Submarines</option>
                    <option value="Fries">Fries</option>
                    <option value="Pasta">Pasta</option>
                    <option value="Chicken">Chicken</option>
                    <option value="Beverages">Beverages</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Price (LKR):</label>
                  <input type="number" id="newItemPrice" step="0.01" required />
                </div>
                <div class="form-group">
                  <label>Quantity:</label>
                  <input type="number" id="newItemQuantity" required />
                </div>
                <div class="form-group">
                  <label>Discount (%):</label>
                  <input
                    type="number"
                    id="newItemDiscount"
                    min="0"
                    max="100"
                    value="0"
                  />
                </div>
                <div class="form-group">
                  <label>Expiration Date:</label>
                  <input type="date" id="newItemExpiry" />
                </div>
                <button
                  type="submit"
                  class="btn btn-primary"
                  onclick="document.getElementById('addItemModal').style.display='none'"
                  
                >
                  Add Item
                </button>
              </form>
            </div>
          </div>


          
    <script src="index.js"></script>
  </body>
</html>
