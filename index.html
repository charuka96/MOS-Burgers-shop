<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- The sidebar -->
      <div class="sidebar">
        <header class="header">
          <h1>🍔 MOS Burgers</h1>
          <p>Restaurant Management System</p>
        </header>
        <a class="active" href="#home">Store Management</a>
        <a href="#news">Order Management</a>
        <a href="#contact">Customer Management</a>
        <a href="#about">Customer Management</a>
      </div>
      <div class="content">
        <!-- Store management section  -->
        <section id="store" class="content-section active">
          <h2>Store Management</h2>

          <div class="search-box">
            <input
              type="text"
              id="storeSearch"
              placeholder="Search items by name, code, or category..."
              oninput="filterStoreItems()"
            />
          </div>

          <div style="margin-bottom: 20px">
            <button class="btn btn-primary" onclick="showAddItemModal()">
              Add New Item
            </button>
            <button class="btn btn-secondary" onclick="checkExpiredItems()">
              Check Expired Items
            </button>
          </div>

          <div id="storeItems" class="food-grid"></div>
        </section>

        <!-- Order Management Section -->
        <section id="orders" class="content-section">
          <h2>Order Management</h2>

          <div class="form-row">
            <div class="form-group">
              <label>Customer Contact Number:</label>
              <input
                type="text"
                id="customerPhone"
                placeholder="Enter customer phone number"
              />
            </div>
            <div class="form-group">
              <label>Customer Name:</label>
              <input
                type="text"
                id="customerName"
                placeholder="Enter customer name"
              />
            </div>
          </div>

          <div class="search-box">
            <input
              type="text"
              id="orderSearch"
              placeholder="Search items by name, code, or category..."
              oninput="filterOrderItems()"
            />
          </div>

          <div id="orderItems" class="food-grid"></div>

          <div class="cart">
            <h3>Order Cart</h3>
            <div id="cartItems"></div>
            <div class="form-group" style="margin-top: 20px">
              <label>Discount Percentage:</label>
              <input
                type="number"
                id="discountPercent"
                placeholder="Enter discount %"
                min="0"
                max="100"
                oninput="updateCartTotal()"
              />
            </div>
            <div class="cart-total" id="cartTotal">Total: LKR 0.00</div>
            <button
              class="btn btn-success"
              onclick="completeOrder()"
              style="margin-top: 15px"
            >
              Complete Order
            </button>
            <button class="btn btn-secondary" onclick="clearCart()">
              Clear Cart
            </button>
          </div>

          <div class="card" style="margin-top: 30px">
            <h3>Previous Orders</h3>
            <div class="form-row">
              <div class="form-group">
                <input
                  type="text"
                  id="searchOrderId"
                  placeholder="Search by Order ID"
                />
              </div>
              <div class="form-group">
                <input
                  type="text"
                  id="searchCustomerId"
                  placeholder="Search by Customer Phone"
                />
              </div>
              <div>
                <button class="btn btn-primary" onclick="searchOrders()">
                  Search Orders
                </button>
              </div>
            </div>
            <div id="orderHistory"></div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
